[stage.started]
phrases = [
    "Stage {stage_name} started ({agent_name}).",
    "Running {stage_name} with {agent_name}.",
]

[stage.completed]
phrases = [
    "Stage {stage_name} completed in {duration_seconds}s (${cost_usd}).",
    "{stage_name} finished — {duration_seconds}s, ${cost_usd}.",
]

[stage.failed]
phrases = [
    "Stage {stage_name} failed: {error_message}",
    "{stage_name} did not complete: {error_message}",
]

[pipeline.started]
phrases = [
    "Pipeline {plan_name} started (budget ${budget_usd}).",
]

[pipeline.completed]
phrases = [
    "Pipeline completed: {stages_completed} stages, {duration_seconds}s, ${total_cost_usd}.",
]

[pipeline.failed]
phrases = [
    "Pipeline failed at {failed_stage}: {error_message}",
]

[session.started]
phrases = [
    "Session started: {task} ({workflow}).",
]

[quality.failed]
phrases = [
    "Gate {gate_name} failed for {stage_name} ({severity}): {message}",
]

[cost.budget_warning]
phrases = [
    "Budget warning: {percent}% used (${current_usd} / ${budget_usd}).",
]

[dispatch.failed]
phrases = [
    "Dispatch failed for {agent_name}: {error_message}",
]

# Vault lifecycle — the knowledge store as an active named surface.
# Lifecycle event-bus emission is deferred to a follow-up; phrase banks
# pre-staged so wiring lands cleanly when vault.* events are emitted.
[vault.stored]
phrases = [
    "Vault: entry recorded ({entry_type}).",
    "Vault: stored {entry_type} entry.",
]

[vault.retrieved]
phrases = [
    "Vault: retrieving {entry_type}.",
    "Vault: returning matches for {entry_type}.",
]

[vault.migrated]
phrases = [
    "Vault: migration complete ({entries_migrated} entries).",
    "Vault: schema updated, {entries_migrated} entries carried forward.",
]

[vault.queried]
phrases = [
    "Vault: query complete ({result_count} matches).",
    "Vault: searched for {query_text} ({result_count} matches).",
]
